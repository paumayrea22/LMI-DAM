<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen LMI - Ejercicio 3 - Pau Mayordomo</title>
</head>

<body>
    <script>
        // Creación del tablero (tabla) con un bordecito
        const tablero = document.createElement("table");
        tablero.border = "1";

        // Creación de 8 filas y 8 columnas en la tabla
        for (let i = 1; i <= 8; i++) {
            const miFila = document.createElement("tr");

            for (let j = 1; j <= 8; j++) {
                const miColumna = document.createElement("td");

                // Le ponemos un tamaño de 100px x 100px a cada celda
                miColumna.style.height = "100px";
                miColumna.style.width = "100px";

                // Alternamos los colores para que siga el patrón de un tablero de ajedrez
                if (i % 2 == 0 || j % 2 == 0) {
                    miColumna.style.backgroundColor = "black";
                }
                
                if (i == j || (i + j) % 2 == 0) {
                    miColumna.style.backgroundColor = "white";
                }
                miFila.appendChild(miColumna);
            }
            tablero.append(miFila);
        }
        document.body.appendChild(tablero);
    </script>
</body>

</html>
